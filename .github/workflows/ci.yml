name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Backend and Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: pcov

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: php artisan test --coverage-clover=coverage.xml --min=50

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-clover
          path: coverage.xml

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment and database
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install npm dependencies
        run: npm ci

      - name: Reset E2E database
        run: npm run e2e:reset-db

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run e2e:serve
          wait-on: http://127.0.0.1:8000
          wait-on-timeout: 180
          command: npm run cypress:run
